<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Meade Photography</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#1A1D18;
            color:#F0E9DD;
            font-family:Arial, Helvetica, sans-serif;
        }

        header{
            background:#121410;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid #C9B28C;
        }

        h1{
            font-size:1.4rem;
            letter-spacing:2px;
        }

        nav a{
            color:#F0E9DD;
            text-decoration:none;
            margin-left:25px;
            font-size:1rem;
        }

        nav a:hover{
            color:#C9B28C;
        }

        .hero{
            height:85vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:30px;
        }

        .hero h2{
            font-size:3rem;
            margin-bottom:15px;
        }

        .hero p{
            font-size:1.2rem;
            color:#C9B28C;
        }

nav{
    display:flex;
    align-items:center;
    gap:25px;
}

.dropdown{
    position:relative;
}

.dropdown-content{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:#121410;
    min-width:220px;
    border:1px solid #C9B28C;
}

.dropdown-content a{
    display:block;
    padding:12px 18px;
    margin:0;
}

.dropdown-content a:hover{
    background:#22261F;
}

.dropdown:hover .dropdown-content{
    display:block;
}
    </style>

</head>

<body>

<header>

<h1>John Meade Photography</h1>

<nav>

<div class="dropdown">

<a href="#">Portfolio ▼</a>

<div class="dropdown-content">

<a href="#">Portraits</a>
<a href="#">Sports</a>
<a href="#">Performing Arts</a>
<a href="#">Other</a>

</div>

</div>

<a href="#">Home</a>
<a href="#">Pricing</a>
<a href="#">Contact</a>

</nav>
</nav>

</header>

<section class="hero">

<div>

<h2>Stuck in the Moment.</h2>

<p>Portraits • Sports • Performing Arts</p>

</div>

</section>

</body>
</html>
